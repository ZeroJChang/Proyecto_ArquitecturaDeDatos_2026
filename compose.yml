  backend-service:
    <<: *app-base
    build:
      context: ./backend
      dockerfile: ./dockerfile
      target: build
    command: npm run start
    ports:
      - "3000:3000"
    volumes:
      - ./:/src
    env_file: .env

networks:
  proyecto:
    driver: bridge
