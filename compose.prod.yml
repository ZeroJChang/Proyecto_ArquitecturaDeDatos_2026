services:
  broker:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT_DOCKER://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT_DOCKER://broker:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT_DOCKER:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_DOCKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - proyecto

  iot-producer:
    build:
      context: ./iot-producer
      dockerfile: ./dockerfile
    container_name: iot-producer
    restart: unless-stopped
    depends_on:
      - broker
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_TOPIC_GPS: ${KAFKA_TOPIC_GPS}
      KAFKA_TOPIC_STATUS: ${KAFKA_TOPIC_STATUS}
      SIMULATION_INTERVAL_MS: ${SIMULATION_INTERVAL_MS}
      TOTAL_VEHICLES: ${TOTAL_VEHICLES}
    networks:
      - proyecto

  client:
    build:
      context: ./client
      dockerfile: ./dockerfile
      args:
        REACT_APP_API_URL: /api
        REACT_APP_APP_NAME: ACME-EV
    container_name: client
    restart: unless-stopped
    depends_on:
      - backend-service
    ports:
      - "80:80"
    networks:
      - proyecto

  backend-service:
    build:
      context: ./backend
      dockerfile: ./dockerfile
    container_name: acme-ev-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      PORT: ${BACKEND_PORT}
      WEB_APP_URL: ${WEB_APP_URL}
      POSTGRES_URI: ${POSTGRES_URI}
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    networks:
      - proyecto

  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    environment:
      SPARK_MODE: master
      PYTHONPATH: /opt/spark/jobs
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_TOPIC_GPS: ${KAFKA_TOPIC_GPS}
      KAFKA_TOPIC_STATUS: ${KAFKA_TOPIC_STATUS}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      SPARK_CHECKPOINT_DIR: ${SPARK_CHECKPOINT_DIR}
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    networks:
      - proyecto
    volumes:
      - ./spark-data:/opt/spark/work-dir
      - ./spark/jobs:/opt/spark/jobs

  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: spark-worker-1
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: 1
      PYTHONPATH: /opt/spark/jobs
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    networks:
      - proyecto
    volumes:
      - ./spark-data:/opt/spark/work-dir
      - ./spark/jobs:/opt/spark/jobs

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: spark-worker-2
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: 1
      PYTHONPATH: /opt/spark/jobs
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    networks:
      - proyecto
    volumes:
      - ./spark-data:/opt/spark/work-dir
      - ./spark/jobs:/opt/spark/jobs

networks:
  proyecto:
    driver: bridge
